<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f5f5f5">
<title>funkentechno — albums he's been spinning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f5f5;
    --ink: #0a0a0a;
    --soft: #888;
    --rule: #e2e2e2;
    --link-underline: #c4c4c4;
    --placeholder: #ebebeb;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter Tight', -apple-system, system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  body {
    min-height: 100vh;
    padding: 56px 32px 96px;
  }

  .wrap {
    max-width: 720px;
    margin: 0 auto;
  }

  header { margin-bottom: 64px; }

  h1 {
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }

  h1 a {
    color: var(--ink);
    text-decoration: underline;
    text-decoration-color: var(--link-underline);
    text-underline-offset: 3px;
    text-decoration-thickness: 1px;
  }

  h1 a:hover { text-decoration-color: var(--ink); }

  h1 .by {
    color: var(--soft);
    font-weight: 400;
  }

  .intro {
    font-size: 16px;
    line-height: 1.5;
    color: var(--ink);
    max-width: 520px;
  }

  .intro .soft { color: var(--soft); }

  .intro a {
    color: var(--ink);
    text-decoration: underline;
    text-decoration-color: var(--link-underline);
    text-underline-offset: 3px;
    text-decoration-thickness: 1px;
  }

  .intro a:hover { text-decoration-color: var(--ink); }

  .section-title {
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 32px;
    margin-top: 64px;
  }

  .feed {
    display: flex;
    flex-direction: column;
  }

  .album {
    padding: 32px 0;
    border-top: 1px solid var(--rule);
    opacity: 0;
    transform: translateY(4px);
    animation: rise 0.4s ease-out forwards;
    display: grid;
    grid-template-columns: 144px 1fr;
    gap: 28px;
    align-items: start;
  }

  .album:first-child { border-top: none; padding-top: 0; }

  .album:nth-child(1) { animation-delay: 0.04s; }
  .album:nth-child(2) { animation-delay: 0.08s; }
  .album:nth-child(3) { animation-delay: 0.12s; }
  .album:nth-child(4) { animation-delay: 0.16s; }
  .album:nth-child(5) { animation-delay: 0.20s; }
  .album:nth-child(6) { animation-delay: 0.24s; }
  .album:nth-child(7) { animation-delay: 0.28s; }
  .album:nth-child(8) { animation-delay: 0.32s; }
  .album:nth-child(9) { animation-delay: 0.36s; }
  .album:nth-child(10) { animation-delay: 0.40s; }

  @keyframes rise {
    to { opacity: 1; transform: translateY(0); }
  }

  .cover-link {
    display: block;
    width: 144px;
    height: 144px;
    background: var(--placeholder);
    position: relative;
    overflow: hidden;
    transition: opacity 0.15s;
  }

  .cover-link:hover { opacity: 0.85; }

  .cover-link img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .info {
    padding-top: 4px;
  }

  .title-line {
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 2px;
    letter-spacing: -0.005em;
  }

  .slug {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 13px;
    color: var(--soft);
    margin-bottom: 14px;
    letter-spacing: -0.01em;
  }

  .note {
    font-size: 16px;
    color: var(--ink);
    line-height: 1.5;
    max-width: 540px;
  }

  .links {
    margin-top: 14px;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }

  .link {
    font-size: 14px;
    color: var(--soft);
    text-decoration: underline;
    text-decoration-color: var(--link-underline);
    text-underline-offset: 3px;
    text-decoration-thickness: 1px;
    transition: color 0.15s, text-decoration-color 0.15s;
  }

  .link:hover {
    color: var(--ink);
    text-decoration-color: var(--ink);
  }

  .link .arrow {
    font-size: 11px;
    margin-left: 2px;
  }

  footer {
    margin-top: 96px;
    padding-top: 24px;
    font-size: 14px;
    color: var(--soft);
  }

  footer a {
    color: var(--soft);
    text-decoration: underline;
    text-decoration-color: var(--link-underline);
    text-underline-offset: 3px;
    text-decoration-thickness: 1px;
  }

  footer a:hover {
    color: var(--ink);
    text-decoration-color: var(--ink);
  }

  .dot { margin: 0 8px; color: var(--link-underline); }

  @media (max-width: 600px) {
    body { padding: 40px 20px 64px; }
    .album {
      grid-template-columns: 96px 1fr;
      gap: 20px;
      padding: 24px 0;
    }
    .cover-link { width: 96px; height: 96px; }
    .links { gap: 16px; }
  }

  /* archive grid */
  .archive { display: flex; flex-direction: column; gap: 48px; }

  .arch-month {
    font-size: 13px;
    font-weight: 500;
    color: var(--soft);
    margin-bottom: 20px;
    letter-spacing: -0.005em;
  }

  .arch-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(104px, 1fr));
    gap: 28px 20px;
  }

  .arch {
    display: block;
    text-decoration: none;
    color: var(--ink);
    opacity: 0;
    animation: rise 0.4s ease-out forwards;
  }

  .arch-cover {
    display: block;
    width: 100%;
    aspect-ratio: 1 / 1;
    background: var(--placeholder);
    overflow: hidden;
    transition: opacity 0.15s;
  }

  .arch:hover .arch-cover { opacity: 0.85; }

  .arch-cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .arch-meta {
    margin-top: 10px;
    font-size: 12px;
    line-height: 1.35;
  }

  .arch-artist {
    display: block;
    font-weight: 500;
    letter-spacing: -0.005em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .arch-album {
    display: block;
    color: var(--soft);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .arch-date {
    display: block;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    color: var(--soft);
    margin-top: 4px;
    letter-spacing: -0.01em;
  }

  @media (max-width: 600px) {
    .archive { gap: 36px; }
    .arch-grid { grid-template-columns: repeat(auto-fill, minmax(92px, 1fr)); gap: 22px 14px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1><a href="https://vincentvenema.com/newmusic/">funkentechno</a> <span class="by">by David James</span></h1>
    <p class="intro">
      A reading list of recent album mentions from <a href="https://x.com/funkentechno" target="_blank" rel="noopener">@funkentechno</a> on X.<br>
      <span class="soft">Each entry links through to Bandcamp and Spotify.</span>
    </p>
  </header>

  <div class="section-title">Recent picks</div>

  <main class="feed" id="feed"></main>

  <div class="section-title" id="archive-title">Archive</div>

  <div class="archive" id="archive"></div>

  <footer>
    <a href="https://x.com/funkentechno" target="_blank" rel="noopener">@funkentechno</a>
    <span class="dot">·</span>
    <a href="https://mixcloud.com/OptimisticUnderground/" target="_blank" rel="noopener">Mixcloud</a>
    <span class="dot">·</span>
    <span class="soft">artwork via bandcamp</span>
  </footer>

</div>

<script>
// album list, newest first, maintained by update.js (recent cards + archive)
const albums = [
  {
    "artist": "Shed",
    "album": "Rave Echoes",
    "bandcamp": "https://shed030.bandcamp.com/album/rave-echoes",
    "cover": "https://f4.bcbits.com/img/a1000442193_5.jpg",
    "note": "we're just drowning in great techno this year, aren't we?dreamy and propulsive in equal measure, hypnotic blast of energy first thing in the morning today. this might be the most instantly I've fallen for a Shed album…",
    "date": "Jun 2026"
  },
  {
    "artist": "Laurence Pike",
    "album": "Possible Utopias for Jazz Quintet",
    "bandcamp": "https://laurencepike.bandcamp.com/album/possible-utopias-for-jazz-quintet",
    "cover": "https://f4.bcbits.com/img/a0786842562_5.jpg",
    "note": "my favorite musical surprise of the week, hypnotic immersion into deep dream realms, the hazy meeting place between jazz language and ambient structure and fourth world colors. don't miss if you're into Total Blue,…",
    "date": "May 2026"
  },
  {
    "artist": "Heathered Pearls",
    "album": "Window",
    "bandcamp": "https://heatheredpearls.bandcamp.com/album/window",
    "cover": "https://f4.bcbits.com/img/a3783281069_5.jpg",
    "note": "deep ambient techno zone explorer, sounds much more massive than its half hour runtime suggests, feels akin to Global Communication & early warp era space vehicles. becoming a favorite nighttime reading album too…",
    "date": "May 2026"
  },
  {
    "artist": "Speedy J",
    "album": "Walkman",
    "bandcamp": "https://speedyj.bandcamp.com/album/walkman",
    "cover": "https://f4.bcbits.com/img/a4265350190_5.jpg",
    "note": "new Speedy J album Walkman goes hard AF for 90 minutes straight. RIYL Sandwell District, Hieroglyphic Being, the scifi side of IDM, getting your skull rattled in deep space, etc. speedyj.bandcamp.com/album/walkman",
    "date": "May 2026"
  },
  {
    "artist": "Mei Honeycomb",
    "album": "Clairvoyant Dimensions",
    "bandcamp": "https://meakusma.bandcamp.com/album/clairvoyant-dimensions",
    "cover": "https://f4.bcbits.com/img/a3084570307_5.jpg",
    "note": "Jordan Czamanski teamed up with saxophonist Jeff Hollie for this cosmic ambient space-jazz explorer. \"Duct Tape Blues\" feels like it could soundtrack a Lynch movie. right up my alley kinda stuff.…",
    "date": "May 2026"
  },
  {
    "artist": "Khotin",
    "album": "KIND 013",
    "bandcamp": "https://heart.bandcamp.com/album/kind-013",
    "cover": "https://f4.bcbits.com/img/a0549155817_5.jpg",
    "note": "new Khotin EP is a total JAM. 20+ minute blast of dubby balearic dreams heart.bandcamp.com/album/kind-013",
    "date": "May 2026"
  }
];

function spotifySearch(artist, album) {
  return `https://open.spotify.com/search/${encodeURIComponent(artist + ' ' + album)}`;
}

function escapeHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function slug(artist, album) {
  const s = (artist + '/' + album).toLowerCase().replace(/[^a-z0-9\/]+/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
  return 'x.com/funkentechno/' + s;
}

const RECENT_COUNT = 6;

function cardHtml(a) {
  return `
    <article class="album">
      <a class="cover-link" href="${escapeHtml(a.bandcamp)}" target="_blank" rel="noopener" aria-label="${escapeHtml(a.artist)} - ${escapeHtml(a.album)}">
        <img src="${escapeHtml(a.cover)}" alt="${escapeHtml(a.artist)} - ${escapeHtml(a.album)}" loading="lazy">
      </a>
      <div class="info">
        <div class="title-line">${escapeHtml(a.artist)} / ${escapeHtml(a.album)}</div>
        <div class="slug">${escapeHtml(slug(a.artist, a.album))} · ${escapeHtml(a.date)}</div>
        <p class="note">${escapeHtml(a.note)}</p>
        <div class="links">
          <a class="link" href="${escapeHtml(a.bandcamp)}" target="_blank" rel="noopener">
            Bandcamp <span class="arrow">↗︎</span>
          </a>
          <a class="link" href="${spotifySearch(a.artist, a.album)}" target="_blank" rel="noopener">
            Spotify <span class="arrow">↗︎</span>
          </a>
        </div>
      </div>
    </article>
  `;
}

function archHtml(a) {
  return `
    <a class="arch" href="${escapeHtml(a.bandcamp)}" target="_blank" rel="noopener" aria-label="${escapeHtml(a.artist)} - ${escapeHtml(a.album)}">
      <span class="arch-cover">
        <img src="${escapeHtml(a.cover)}" alt="${escapeHtml(a.artist)} - ${escapeHtml(a.album)}" loading="lazy">
      </span>
      <span class="arch-meta">
        <span class="arch-artist">${escapeHtml(a.artist)}</span>
        <span class="arch-album">${escapeHtml(a.album)}</span>
      </span>
    </a>
  `;
}

const MONTH_INDEX = { jan: 0, feb: 1, mar: 2, apr: 3, may: 4, jun: 5, jul: 6, aug: 7, sep: 8, oct: 9, nov: 10, dec: 11 };
const MONTH_LONG = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

function monthLabel(dateStr) {
  const parts = String(dateStr || '').trim().split(/\s+/);
  const mi = MONTH_INDEX[(parts[0] || '').slice(0, 3).toLowerCase()];
  if (mi === undefined) return String(dateStr || '');
  return `${MONTH_LONG[mi]} ${parts[1] || ''}`.trim();
}

function render() {
  const recent = albums.slice(0, RECENT_COUNT);
  const archive = albums.slice(RECENT_COUNT);

  document.getElementById('feed').innerHTML = recent.map(cardHtml).join('');

  const archiveTitle = document.getElementById('archive-title');
  const archiveEl = document.getElementById('archive');

  if (!archive.length) {
    archiveTitle.style.display = 'none';
    archiveEl.style.display = 'none';
    return;
  }

  const groups = [];
  for (const a of archive) {
    const label = monthLabel(a.date);
    const last = groups[groups.length - 1];
    if (last && last.label === label) last.items.push(a);
    else groups.push({ label, items: [a] });
  }

  archiveEl.innerHTML = groups.map((g) => `
    <section class="arch-group">
      <div class="arch-month">${escapeHtml(g.label)}</div>
      <div class="arch-grid">${g.items.map(archHtml).join('')}</div>
    </section>
  `).join('');
}

render();
</script>
</body>
</html>
