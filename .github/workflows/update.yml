name: Update album feed

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: update-feed
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Run update
        run: node update.js

      - name: Commit if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "auto: refresh album feed"
            for i in 1 2 3 4 5; do
              if git push origin "HEAD:${GITHUB_REF_NAME}"; then
                echo "pushed"; break
              fi
              echo "push rejected, syncing remote (attempt $i)"
              git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || git rebase --abort || true
              sleep 3
            done
          fi

      - name: Stage site
        run: |
          mkdir -p dist/assets dist/fonts
          cp index.html dist/
          cp feedproxy.php dist/ 2>/dev/null || true
          cp assets/* dist/assets/ 2>/dev/null || true
          cp fonts/* dist/fonts/ 2>/dev/null || true

      - name: Deploy to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_TARGET_DIR }}
          local-dir: ./dist/
          protocol: ftps
