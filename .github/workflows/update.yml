name: Update album feed

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: update-feed
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Run update
        run: node update.js

      - name: Commit if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          BRANCH="${GITHUB_REF_NAME}"
          for i in 1 2 3 4 5; do
            git add index.html
            if git diff --staged --quiet; then
              echo "No changes to push."
              exit 0
            fi
            git commit -m "auto: refresh album feed"
            if git push origin "HEAD:${BRANCH}"; then
              echo "pushed"
              exit 0
            fi
            # index.html is generated; don't rebase it (guaranteed conflict).
            # Take the latest origin and regenerate on top - the scraper merges add-only.
            echo "push rejected; rebuilding on latest origin (attempt $i)"
            git fetch origin "${BRANCH}"
            git reset --hard "origin/${BRANCH}"
            node update.js
            sleep 2
          done
          echo "still failing after retries"
          exit 1

      - name: Stage site
        run: |
          mkdir -p dist/assets dist/fonts
          cp index.html dist/
          cp feedproxy.php dist/ 2>/dev/null || true
          cp assets/* dist/assets/ 2>/dev/null || true
          cp fonts/* dist/fonts/ 2>/dev/null || true

      - name: Deploy to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_TARGET_DIR }}
          local-dir: ./dist/
          protocol: ftps
